trigger:
- main

variables:
  LOCUST_ENV_VAR: 'prod' # This is the default if no one changes it

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install locust  # Ensuring locust is present
  displayName: 'Install Dependencies'

- script: |
    #echo "--- Current Directory Structure ---"
    #ls -R
    # Running in headless mode for 1 minute as an example
    # --run-time 1m: How long to run
    # --users 10: Number of users
    # --spawn-rate 2: How fast to start users
    
    echo "--- Starting Locust Load Test ---"
    # 1. Force the Azure variable into a local Shell variable
    MY_ENV="$(LOCUST_ENV_VAR)"
    echo "Confirmed Environment: $MY_ENV"
    
    # 2. Export it so Python's os.getenv('LOCUST_ENV') can see it
    export LOCUST_ENV=$MY_ENV
    locust -f locustfile.py --headless -u 10 -r 1 --run-time 10s --html=locust_report.html
  displayName: 'Run Locust Load Test'
  env:
    LOCUST_ENV_VAR: $(LOCUST_ENV_VAR)  # This maps the Pipeline variable to the Script environment

- task: PublishPipelineArtifact@1
  displayName: 'Publish Locust Report'
  inputs:
    targetPath: '$(System.DefaultWorkingDirectory)/locust_report.html'
    artifact: 'LocustReport'
    publishLocation: 'pipeline'
  condition: always()